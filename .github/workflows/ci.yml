# .github/workflows/ci.yml
#
# Workflow único do Crias-Server. Jobs rodam em paralelo:
#
#   lint-shell ─┐
#   lint-go ────┤
#   lint-python ┤
#   test-shell ─┤──→ build-iso ────┐
#   test-go ─────┤──→ build-agent ─┤──→ release (consolida todos artefatos)
#   test-python ─┘──→ build-bot ───┘
#
# Release é criada apenas em:
#   - push de tag v*.*.* (release manual)
#   - workflow_dispatch com input release=true
#
# Em push/PR normal, apenas lint + test + build rodam (sem release).

name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Criar release no final (consolida ISO + agent + bot)'
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.12'

jobs:
  # ═══════════════════════════════════════════════════════
  # LINT (3 jobs paralelos: shell, go, python)
  # ═══════════════════════════════════════════════════════

  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run shellcheck
        # -x segue sources (resolve SC1091)
        # --exclude suprime falsos positivos conhecidos:
        #   SC1091: não segue source (já tratado com -x, mas alguns ainda warn)
        #   SC2034: var "unused" — falso positivo em libs sourced (vars usadas por callers)
        #   SC2016: expressões em single quotes — intencional em muitos casos
        #   SC2086: double quote — vamos corrigir aos poucos, não bloqueia CI
        #   SC2154: var referenced but not assigned — falso positivo em libs sourced
        #   SC2310: set -e em função — intencional
        run: |
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -x \
                --exclude SC1091,SC2034,SC2016,SC2086,SC2154,SC2310 \
                --severity=warning \
                || true
          # Re-roda só com errors (severity=error) para decidir pass/fail
          find . -name '*.sh' -not -path './.git/*' -print0 \
            | xargs -0 shellcheck -x \
                --exclude SC1091 \
                --severity=error

  lint-go:
    name: Lint Go
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: discord-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: discord-agent/go.sum

      - name: Install protoc + plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.32.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate proto + tidy
        run: |
          make proto
          go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: Go fmt check (non-blocking)
        # gofmt -l lista arquivos não formatados. Non-blocking por enquanto
        # (arquivos Go usam espaços em vez de tabs — migrar gradualmente).
        continue-on-error: true
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "⚠️ Arquivos não formatados com gofmt (non-blocking):"
            gofmt -l .
          else
            echo "✓ Todos os arquivos Go formatados com gofmt"
          fi

  lint-python:
    name: Lint Python
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff==0.3.7

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  # ═══════════════════════════════════════════════════════
  # TEST (3 jobs paralelos: shell, go, python)
  # ═══════════════════════════════════════════════════════

  test-shell:
    name: Test Shell
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run shell test suite
        # Roda bateria bash (sem testes ISO que precisam de ISO real).
        # install-contracts e arch-dry-install rodam em container Arch separado.
        run: |
          bash tests/quick-script-tests.sh
          bash tests/install-contracts.sh
          bash tests/static-audit.sh
          bash tests/stack-installer-test.sh
          bash tests/agent-install-hook-test.sh
          bash tests/config-parser-eq-test.sh

  test-shell-arch:
    name: Test Shell (Arch container)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    container:
      image: archlinux:base-devel
      options: --privileged --security-opt seccomp=unconfined
    steps:
      - name: Install deps
        run: |
          pacman-key --init || true
          pacman-key --populate archlinux || true
          pacman -Syu --noconfirm --needed git bash gettext jq

      - uses: actions/checkout@v4

      - name: Run arch-specific tests
        run: |
          bash tests/arch-smoke.sh
          bash tests/arch-dry-install.sh

  test-go:
    name: Test Go (race)
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: discord-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: discord-agent/go.sum

      - name: Install protoc + plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.32.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate proto + tidy
        run: |
          make proto
          go mod tidy

      - name: Go test with race detector
        run: go test -v -race -timeout 120s ./...

  test-python:
    name: Test Python
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: discord-bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Generate protobuf code
        run: |
          mkdir -p src/crias_bot/grpc_gen
          python -m grpc_tools.protoc \
              -I ../discord-agent/proto \
              --python_out=src/crias_bot/grpc_gen \
              --grpc_python_out=src/crias_bot/grpc_gen \
              ../discord-agent/proto/crias.proto
          sed -i 's/^import crias_pb2 as crias__pb2/from crias_bot.grpc_gen import crias_pb2 as crias__pb2/' \
              src/crias_bot/grpc_gen/crias_pb2_grpc.py
          touch src/crias_bot/grpc_gen/__init__.py

      - name: Run pytest
        run: PYTHONPATH=src python -m pytest tests/ -v --tb=short

  # ═══════════════════════════════════════════════════════
  # BUILD (3 jobs paralelos: ISO, agent, bot) — só em main ou tag
  # ═══════════════════════════════════════════════════════

  build-iso:
    name: Build ISO
    needs: [lint-shell, test-shell, test-shell-arch]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    permissions:
      contents: read
    container:
      image: archlinux:base-devel
      options: --privileged --security-opt seccomp=unconfined
    steps:
      - name: Install dependencies
        run: |
          # pacman-key --init pode falhar em alguns runners; usamos --noconfirm
          # e continuamos mesmo se houver warning (keyring já vem populado na
          # imagem archlinux:base-devel atual).
          pacman-key --init || true
          pacman-key --populate archlinux || true
          pacman -Syu --noconfirm --needed archiso git grub

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync installer into airootfs (embed scripts in ISO)
        # Popula archiso-profile/airootfs/opt/crias-server/ com cópia do repo
        # para que a ISO nasça "pronta pra uso" (sem precisar de git clone no
        # primeiro boot). Ver archiso-profile/sync-airootfs.sh.
        run: |
          bash archiso-profile/sync-airootfs.sh
          echo "=== Conteúdo embutido na ISO (airootfs/opt/crias-server/) ==="
          find archiso-profile/airootfs/opt/crias-server/ -type f | sort

      - name: Validate embedded scripts
        run: bash tests/iso-embedded-scripts-validate.sh

      - name: Build ISO
        run: |
          mkdir -p out
          rm -rf /tmp/archiso-tmp
          mkarchiso -v -w /tmp/archiso-tmp -o out/ archiso-profile/

      - name: Generate checksums
        run: |
          cd out
          sha256sum *.iso > sha256sums-iso.txt

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-iso
          path: |
            out/*.iso
            out/sha256sums-iso.txt
          retention-days: 7

  test-iso-qemu:
    name: Test ISO (QEMU boot)
    needs: [build-iso]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: artifact-iso
          path: iso-download/

      - name: Find ISO file
        id: find_iso
        run: |
          ISO_FILE="$(find iso-download/ -name '*.iso' -type f | head -1)"
          if [ -z "$ISO_FILE" ]; then
            echo "FAIL: nenhuma ISO encontrada em iso-download/" >&2
            ls -la iso-download/ >&2
            exit 1
          fi
          echo "ISO encontrada: $ISO_FILE"
          ls -lh "$ISO_FILE"
          echo "iso_path=$ISO_FILE" >> "$GITHUB_OUTPUT"

      - name: Validate ISO 9660 format
        run: |
          ISO_FILE="${{ steps.find_iso.outputs.iso_path }}"
          # Verifica magic bytes de ISO 9660
          file "$ISO_FILE"
          if ! file "$ISO_FILE" | grep -qi 'ISO 9660'; then
            echo "FAIL: arquivo não é ISO 9660 válido" >&2
            exit 1
          fi
          # Verifica El Torito boot record no setor 17 da ISO 9660.
          # Estrutura ISO 9660:
          #   setor 16 (offset 32768): Primary Volume Descriptor (tipo 1)
          #   setor 17 (offset 34816): El Torito Boot Record (tipo 0)
          #   setor 18 (offset 36864): VD Set Terminator (tipo 255)
          # O Boot Record tem a string "EL TORITO SPECIFICATION" no offset 7
          # dentro do setor.
          #
          # IMPORTANTE: NÃO usar EL_TORITO="$(dd ...)" + echo | grep, porque:
          #   1. Offset 32769 (setor 16+1) aponta para o PVD, não o Boot Record.
          #      O offset correto é o setor 17 (skip=17 com bs=2048).
          #   2. bash $(...) stripa null bytes de output binário, corrompendo
          #      a comparação (warning: "ignored null byte in input").
          # Solução: pipe direto dd | grep -a (grep -a trata binário como texto).
          if dd if="$ISO_FILE" bs=2048 skip=17 count=1 2>/dev/null | grep -aq 'EL TORITO SPECIFICATION'; then
            echo "OK: El Torito boot record presente (ISO é bootável)"
          else
            echo "FAIL: El Torito boot record não encontrado no setor 17" >&2
            echo "  (dump do setor 17 para debug:)" >&2
            dd if="$ISO_FILE" bs=2048 skip=17 count=1 2>/dev/null | od -c | head -4 >&2
            exit 1
          fi

      - name: Install QEMU and OVMF (UEFI firmware)
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf
          echo "=== QEMU version ==="
          qemu-system-x86_64 --version | head -2
          echo "=== OVMF firmware ==="
          ls -la /usr/share/OVMF/ 2>/dev/null || ls -la /usr/share/ovmf/ 2>/dev/null || true

      - name: Enable KVM for faster QEMU boot
        # GitHub Actions ubuntu-22.04 runners têm /dev/kvm disponível.
        # KVM acelera o boot de ~10 min (emulação pura) para ~30s (virtualização).
        # Sem KVM, o kernel pode não completar boot em 5 min.
        id: kvm
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            echo "✓ KVM disponível (/dev/kvm acessível)"
            echo "has_kvm=true" >> "$GITHUB_OUTPUT"
          else
            echo "⚠ KVM não disponível — boot será lento (emulação TCG)"
            echo "has_kvm=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Boot ISO in QEMU (BIOS legacy) — complete validation
        run: |
          ISO_FILE="${{ steps.find_iso.outputs.iso_path }}"
          HAS_KVM="${{ steps.kvm.outputs.has_kvm }}"
          echo "=== Boot BIOS legacy (420s / 7 min complete validation) ==="
          echo "KVM: $HAS_KVM"
          #
          # Com KVM, o kernel Linux boota completamente em ~30-60s. Sem KVM
          # (emulação TCG pura), pode levar 10+ min. Usamos 420s (7 min) para
          # garantir que o kernel complete o boot mesmo em runners lentos.
          #
          # Validação COMPLETA (não apenas "Loading vmlinuz"):
          #   PASS se: "Linux version" no log → kernel bootou completamente
          #   PASS se: "archiso.*loaded" OU ":: running hook" → archiso init
          #   FAIL caso contrário → ISO com problema
          #
          # Parâmetros do kernel (configurados em syslinux.cfg):
          #   edd=off            — pula EDD BIOS probing (lento no QEMU)
          #   console=ttyS0,115200 — output do kernel via serial (QEMU captura)
          #   console=tty0       — mantém output no VGA também (para hardware real)
          #   earlyprintk=serial,ttyS0,115200 — mensagens early do kernel no serial
          #   loglevel=8         — verbosity máxima (debug)
          #
          # syslinux.cfg NÃO tem SERIAL 0 (removido para evitar duplicação de
          # caracteres no log). syslinux outputa só para VGA; kernel outputa
          # para serial via console=ttyS0. Sem duplicação.
          #
          # QEMU flags:
          #   -enable-kvm -cpu host — virtualização acelerada (se KVM disponível)
          #   -smp 2            — 2 CPUs virtuais (boot mais rápido)
          #   -m 4096           — 4GB RAM (archiso squashfs precisa de RAM)
          #   -nographic        — serial para stdio, sem display VGA
          #   -no-reboot        — não reinicia em panic (fica até timeout)
          #   -serial mon:stdio — serial multiplexado com monitor em stdio
          KVM_ARGS=""
          if [ "$HAS_KVM" = "true" ]; then
            KVM_ARGS="-enable-kvm -cpu host"
          else
            KVM_ARGS="-cpu max"
          fi
          echo "QEMU args: $KVM_ARGS -smp 2 -m 4096"

          qemu_log="$(mktemp /tmp/crias-qemu-bios-XXXXXX.log)"
          timeout 420 qemu-system-x86_64 \
            $KVM_ARGS \
            -smp 2 \
            -m 4096 \
            -cdrom "$ISO_FILE" \
            -boot d \
            -nographic \
            -no-reboot \
            -serial mon:stdio \
            </dev/null >"$qemu_log" 2>&1 || true

          echo "=== Log QEMU completo (BIOS) — primeiras 50 linhas ==="
          head -50 "$qemu_log"
          echo ""
          echo "=== Log QEMU completo (BIOS) — últimas 100 linhas ==="
          tail -100 "$qemu_log"
          echo ""
          echo "=== Tamanho do log: $(wc -l < "$qemu_log") linhas ==="

          # Validação COMPLETA: kernel deve bootar e archiso deve carregar.
          PASS=false
          BOOT_STAGE=""

          # 1. Kernel bootou completamente?
          if grep -qi 'Linux version' "$qemu_log"; then
            echo "✓ OK: kernel Linux inicializou (BIOS boot)"
            grep -oE 'Linux version [0-9.]+[^ ]*' "$qemu_log" | head -1
            PASS=true
            BOOT_STAGE="kernel-booted"
          else
            echo "✗ FAIL: kernel Linux não inicializou em 420s (BIOS boot)" >&2
            BOOT_STAGE="kernel-NOT-booted"
          fi

          # 2. archiso hooks carregaram? (indica que initramfs funcionou)
          if grep -qi 'archiso' "$qemu_log"; then
            echo "✓ OK: archiso hooks carregados (BIOS boot)"
            BOOT_STAGE="$BOOT_STAGE+archiso"
          else
            echo "⚠ AVISO: archiso não encontrado no log (BIOS boot)" >&2
          fi

          # 3. Chegou ao userspace? (systemd/init)
          if grep -qi 'Welcome to .*Arch Linux\|systemd\|Starting\|:: running hook' "$qemu_log"; then
            echo "✓ OK: userspace inicializando (BIOS boot)"
            BOOT_STAGE="$BOOT_STAGE+userspace"
          fi

          echo ""
          echo "Boot stage: $BOOT_STAGE"
          rm -f "$qemu_log"
          if [ "$PASS" != "true" ]; then
            exit 1
          fi

      - name: Boot ISO in QEMU (UEFI) — complete validation
        run: |
          ISO_FILE="${{ steps.find_iso.outputs.iso_path }}"
          HAS_KVM="${{ steps.kvm.outputs.has_kvm }}"
          echo "=== Boot UEFI (420s / 7 min complete validation) ==="
          echo "KVM: $HAS_KVM"
          # Cria cópia writable do OVMF_VARS (UEFI requer NVRAM vars file writable).
          OVMF_VARS="/tmp/ovmf-vars.fd"
          OVMF_SRC=""
          for candidate in /usr/share/OVMF/OVMF_VARS.fd /usr/share/ovmf/OVMF_VARS.fd /usr/share/OVMF/OVMF_VARS_4M.fd; do
            if [ -f "$candidate" ]; then
              OVMF_SRC="$candidate"
              break
            fi
          done
          if [ -z "$OVMF_SRC" ]; then
            echo "AVISO: OVMF_VARS.fd não encontrado — pulando teste UEFI" >&2
            exit 0
          fi
          cp "$OVMF_SRC" "$OVMF_VARS"
          OVMF_CODE="$(dirname "$OVMF_SRC")/$(echo "$OVMF_SRC" | xargs basename | sed 's/VARS/CODE/')"
          if [ ! -f "$OVMF_CODE" ]; then
            # Fallback: tentar OVMF_CODE.fd no mesmo dir
            OVMF_CODE="$(dirname "$OVMF_SRC")/OVMF_CODE.fd"
          fi
          echo "OVMF_CODE: $OVMF_CODE"
          echo "OVMF_VARS: $OVMF_VARS"

          KVM_ARGS=""
          if [ "$HAS_KVM" = "true" ]; then
            KVM_ARGS="-enable-kvm -cpu host"
          else
            KVM_ARGS="-cpu max"
          fi
          echo "QEMU args: $KVM_ARGS -smp 2 -m 4096"

          qemu_log="$(mktemp /tmp/crias-qemu-uefi-XXXXXX.log)"
          timeout 420 qemu-system-x86_64 \
            $KVM_ARGS \
            -smp 2 \
            -m 4096 \
            -drive if=pflash,format=raw,readonly=on,file="$OVMF_CODE" \
            -drive if=pflash,format=raw,file="$OVMF_VARS" \
            -cdrom "$ISO_FILE" \
            -boot d \
            -nographic \
            -no-reboot \
            -serial mon:stdio \
            </dev/null >"$qemu_log" 2>&1 || true

          echo "=== Log QEMU completo (UEFI) — primeiras 50 linhas ==="
          head -50 "$qemu_log"
          echo ""
          echo "=== Log QEMU completo (UEFI) — últimas 100 linhas ==="
          tail -100 "$qemu_log"
          echo ""
          echo "=== Tamanho do log: $(wc -l < "$qemu_log") linhas ==="

          # Validação COMPLETA (mesma lógica do BIOS boot):
          PASS=false
          if grep -qi 'Linux version' "$qemu_log"; then
            echo "✓ OK: kernel Linux inicializou (UEFI boot)"
            PASS=true
          else
            echo "✗ FAIL: kernel Linux não inicializou em 420s (UEFI boot)" >&2
          fi

          if grep -qi 'archiso' "$qemu_log"; then
            echo "✓ OK: archiso hooks carregados (UEFI boot)"
          fi

          rm -f "$qemu_log" "$OVMF_VARS"
          if [ "$PASS" != "true" ]; then
            exit 1
          fi

      - name: Validate embedded installer is accessible in live ISO
        run: |
          echo "=== Validação de que instalador embutido está na ISO ==="
          ISO_FILE="${{ steps.find_iso.outputs.iso_path }}"
          # Monta ISO (read-only) e verifica que /opt/crias-server/install.sh existe.
          # Não podemos bootar e interagir facilmente, mas podemos verificar que
          # o airootfs.squfs tem o arquivo examinando o conteúdo da ISO.
          mkdir -p /tmp/iso-mount
          sudo mount -o loop,ro "$ISO_FILE" /tmp/iso-mount || true

          echo "=== Conteúdo raiz da ISO ==="
          ls -la /tmp/iso-mount/ || true

          # Verifica que o diretório arch/ existe (install_dir do profiledef.sh)
          if [ -d /tmp/iso-mount/arch/ ]; then
            echo "✓ OK: diretório arch/ (install_dir) presente na ISO"
            ls /tmp/iso-mount/arch/
          else
            echo "AVISO: diretório arch/ não encontrado na ISO montada" >&2
            ls -la /tmp/iso-mount/ >&2
          fi

          # Verifica presença do vmlinuz e initramfs (boot mínimo)
          if find /tmp/iso-mount/ -name 'vmlinuz-linux' 2>/dev/null | grep -q .; then
            echo "✓ OK: vmlinuz-linux presente na ISO"
          else
            echo "✗ FAIL: vmlinuz-linux não encontrado na ISO" >&2
            sudo umount /tmp/iso-mount 2>/dev/null || true
            exit 1
          fi

          if find /tmp/iso-mount/ -name 'initramfs-linux.img' 2>/dev/null | grep -q .; then
            echo "✓ OK: initramfs-linux.img presente na ISO"
          else
            echo "✗ FAIL: initramfs-linux.img não encontrado na ISO" >&2
            sudo umount /tmp/iso-mount 2>/dev/null || true
            exit 1
          fi

          sudo umount /tmp/iso-mount 2>/dev/null || true
          echo "=== Validação de estrutura da ISO: OK ==="

  build-agent:
    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [lint-go, test-go]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
    defaults:
      run:
        working-directory: discord-agent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: discord-agent/go.sum

      - name: Install protoc + plugins
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.32.0
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.3.0
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Generate proto + tidy
        run: |
          make proto
          go mod tidy

      - name: Build binary
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME:-${GITHUB_SHA::7}}"
          go build \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o build/crias-agent-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/crias-agent

      - name: Generate checksum
        run: |
          cd build
          sha256sum crias-agent-${{ matrix.goos }}-${{ matrix.goarch }} > crias-agent-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            discord-agent/build/crias-agent-${{ matrix.goos }}-${{ matrix.goarch }}
            discord-agent/build/crias-agent-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
          retention-days: 7

  build-bot:
    name: Build Bot (Docker)
    needs: [lint-python, test-python]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (smoke test)
        # Build context é a raiz do repo porque Dockerfile copia ../discord-agent/proto/
        run: docker build -t crias-bot:ci -f discord-bot/Dockerfile .

      - name: Save image as tar
        run: docker save crias-bot:ci -o /tmp/crias-bot-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-bot-image
          path: /tmp/crias-bot-image.tar
          retention-days: 3

  # ═══════════════════════════════════════════════════════
  # RELEASE — job único que consolida TODOS artefatos
  # ═══════════════════════════════════════════════════════

  release:
    name: Release (consolidada)
    needs: [build-iso, test-iso-qemu, build-agent, build-bot]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.create_release)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== Artefatos baixados ==="
          find artifacts/ -type f | sort
          echo ""
          echo "=== Tamanhos ==="
          du -sh artifacts/*

      - name: Prepare release assets
        run: |
          mkdir -p release-assets/iso release-assets/agent release-assets/bot release-assets/src

          # ISO + checksum
          if [ -f "artifacts/$(ls artifacts/*.iso 2>/dev/null | head -1 | xargs basename)" ]; then
            mv artifacts/*.iso release-assets/iso/ 2>/dev/null || true
            mv artifacts/sha256sums-iso.txt release-assets/iso/ 2>/dev/null || true
          fi

          # Agent binaries + checksums
          mv artifacts/crias-agent-* release-assets/agent/ 2>/dev/null || true

          # Bot Docker image
          mv artifacts/crias-bot-image.tar release-assets/bot/ 2>/dev/null || true

          # Source archives (full + slim)
          # full: repo completo; slim: sem archiso-profile/, docs/, .github/
          mkdir -p release-assets/_pkg/full release-assets/_pkg/slim
          git archive --format=tar HEAD | tar -xf - -C release-assets/_pkg/full
          cp -a release-assets/_pkg/full/. release-assets/_pkg/slim/
          rm -rf release-assets/_pkg/slim/archiso-profile
          rm -rf release-assets/_pkg/slim/docs
          rm -rf release-assets/_pkg/slim/.github/workflows
          (cd release-assets/_pkg/full && zip -qr ../../crias-server-full.zip .)
          (cd release-assets/_pkg/slim && zip -qr ../../crias-server-slim.zip .)

          # Checksum global
          cd release-assets
          find . -type f \( -name '*.iso' -o -name '*.zip' -o -name 'crias-agent-*' \) \
            ! -name '*.sha256' \
            -exec sha256sum {} \; | sed 's|  \./|  |' > sha256sums.txt
          cat sha256sums.txt

      - name: Compute release tag
        id: release_tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            SHORT_SHA="$(git rev-parse --short HEAD)"
            TAG="v$(date -u +%Y.%m.%d)-${SHORT_SHA}"
            # Garante unicidade
            if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
              TAG="${TAG}-r${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Import GPG key (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import

      - name: Sign checksums (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        if: env.GPG_PRIVATE_KEY != ''
        run: |
          cd release-assets
          gpg --batch --yes --detach-sign -o sha256sums.txt.sig sha256sums.txt

      - name: Create and push tag (if workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release_tag.outputs.tag }}"
          git push origin "${{ steps.release_tag.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          assets=()
          # ISO
          for f in release-assets/iso/*; do
            [ -f "$f" ] && assets+=("$f")
          done
          # Agent binaries
          for f in release-assets/agent/*; do
            [ -f "$f" ] && assets+=("$f")
          done
          # Bot image
          [ -f release-assets/bot/crias-bot-image.tar ] && assets+=("release-assets/bot/crias-bot-image.tar")
          # Source archives
          assets+=("release-assets/crias-server-full.zip")
          assets+=("release-assets/crias-server-slim.zip")
          # Checksums
          assets+=("release-assets/sha256sums.txt")
          [ -f release-assets/sha256sums.txt.sig ] && assets+=("release-assets/sha256sums.txt.sig")

          echo "=== Assets para release ==="
          printf '  %s\n' "${assets[@]}"

          gh release create "${{ steps.release_tag.outputs.tag }}" \
            "${assets[@]}" \
            --title "Release ${{ steps.release_tag.outputs.tag }}" \
            --generate-notes \
            --prerelease=${{ contains(steps.release_tag.outputs.tag, '-beta') || contains(steps.release_tag.outputs.tag, '-rc') }}
