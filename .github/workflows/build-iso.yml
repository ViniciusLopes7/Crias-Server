name: Build Archiso and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-iso-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './'

  static_audit:
    name: Static Audit
    needs: lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run static audit
        run: bash tests/static-audit.sh

  quick_script_tests:
    name: Quick Script Tests
    needs: [lint, static_audit]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run quick script tests
        run: bash tests/quick-script-tests.sh

  validate_profile:
    name: Validate Archiso Profile
    needs: lint
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate archiso profile
        run: bash tests/archiso-profile-validate.sh

  arch_smoke:
    name: Arch Smoke Tests
    needs: [lint, quick_script_tests]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:base-devel
      # mkarchiso requires additional mount/syscalls inside the container.
      # Use privileged mode so mkarchiso can setup /proc and other mounts correctly.
      options: --privileged --security-opt seccomp=unconfined
    steps:
      - name: Install CI dependencies
        run: |
          pacman-key --init || true
          pacman-key --populate archlinux || true
          pacman -Syu --noconfirm --needed git bash

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run install contract tests
        run: bash tests/install-contracts.sh

      - name: Run arch smoke tests
        run: bash tests/arch-smoke.sh

      - name: Run arch dry install tests
        run: bash tests/arch-dry-install.sh

  build:
    needs: [lint, quick_script_tests, validate_profile, arch_smoke]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:base-devel
      options: --privileged --security-opt seccomp=unconfined
    steps:
      - name: Install dependencies
        run: |
          pacman-key --init || true
          pacman-key --populate archlinux || true
          pacman -Syu --noconfirm --needed archiso git grub

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build ISO
        run: |
          mkdir -p out
          rm -rf /tmp/archiso-tmp
          mkarchiso -v -w /tmp/archiso-tmp -o out/ archiso-profile/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: crias-server-iso
          path: out/*.iso
          retention-days: 7

  validate_iso_artifact:
    name: Validate ISO Artifact
    needs: build
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: read
    container:
      image: archlinux:base-devel
      options: --privileged --security-opt seccomp=unconfined
    steps:
      - name: Install validation dependencies
        run: |
          pacman-key --init || true
          pacman-key --populate archlinux || true
          pacman -Syu --noconfirm --needed git bash mkinitcpio libarchive squashfs-tools

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: crias-server-iso
          path: out

      - name: Validate initramfs hooks and squashfs
        run: |
          ISO_FILE="$(ls out/*.iso | head -n 1)"
          if [ -z "$ISO_FILE" ]; then
            echo "::error::ISO artifact not found."
            exit 1
          fi
          bash tests/iso-initramfs-validate.sh "$ISO_FILE" | tee iso-initramfs-validate.log

      - name: Validate live ISO credentials
        run: |
          ISO_FILE="$(ls out/*.iso | head -n 1)"
          if [ -z "$ISO_FILE" ]; then
            echo "::error::ISO artifact not found."
            exit 1
          fi
          bash tests/iso-live-credentials-validate.sh "$ISO_FILE" | tee iso-live-credentials-validate.log

      - name: Upload ISO validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iso-validation-log
          path: |
            iso-initramfs-validate.log
            iso-live-credentials-validate.log
          if-no-files-found: ignore
          retention-days: 7

  qemu_boot:
    name: QEMU Boot Smoke
    needs: [build, validate_iso_artifact]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 45
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: crias-server-iso
          path: out

      - name: Install QEMU dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils libarchive-tools expect

      - name: Run QEMU deep smoke
        run: |
          ISO_FILE="$(ls out/*.iso | head -n 1)"
          if [ -z "$ISO_FILE" ]; then
            echo "::error::ISO artifact not found."
            exit 1
          fi
          bash tests/iso-qemu-boot.sh --deep-smoke "$ISO_FILE" 420

      - name: Upload QEMU boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qemu-boot-log
          path: qemu-boot.log
          if-no-files-found: ignore
          retention-days: 7

  release:
    name: Create Tag and Release
    needs: [build, validate_iso_artifact, qemu_boot]
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: crias-server-iso
          path: release-assets/iso

      - name: Compute release tag
        id: release_tag
        run: |
          SHORT_SHA="$(git rev-parse --short HEAD)"
          BASE_TAG="v$(date -u +%Y.%m.%d)-${SHORT_SHA}"
          TAG="${BASE_TAG}"

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG="${BASE_TAG}-r${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            TAG="${BASE_TAG}-r${GITHUB_RUN_ID}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create release archives
        run: |
          mkdir -p release-assets/_pkg/full release-assets/_pkg/slim
          git archive --format=tar HEAD | tar -xf - -C release-assets/_pkg/full

          cp -a release-assets/_pkg/full/. release-assets/_pkg/slim/
          rm -rf release-assets/_pkg/slim/archiso-profile
          rm -rf release-assets/_pkg/slim/docs
          rm -rf release-assets/_pkg/slim/.github/workflows

          (cd release-assets/_pkg/full && zip -qr ../../crias-server-full.zip .)
          (cd release-assets/_pkg/slim && zip -qr ../../crias-server-slim.zip .)

          sha256sum release-assets/iso/*.iso release-assets/crias-server-full.zip release-assets/crias-server-slim.zip > release-assets/sha256sums.txt

      - name: Import release GPG key (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_PRIVATE_KEY}" ]; then
            printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          else
            echo "No GPG_PRIVATE_KEY provided; skipping import"
          fi

      - name: Sign checksums (optional)
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_PRIVATE_KEY}" ]; then
            gpg --batch --yes --detach-sign -o release-assets/sha256sums.txt.sig release-assets/sha256sums.txt
          else
            echo "No GPG_PRIVATE_KEY provided; skipping signing"
          fi

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.release_tag.outputs.tag }}"
          git push origin "${{ steps.release_tag.outputs.tag }}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISO_FILE="$(ls release-assets/iso/*.iso | head -n 1)"

          if [ -z "${ISO_FILE}" ]; then
            echo "::error::ISO artifact not found."
            exit 1
          fi

          assets=(
            "${ISO_FILE}"
            release-assets/crias-server-full.zip
            release-assets/crias-server-slim.zip
            release-assets/sha256sums.txt
          )

          if [ -f release-assets/sha256sums.txt.sig ]; then
            assets+=(release-assets/sha256sums.txt.sig)
          fi

          gh release create "${{ steps.release_tag.outputs.tag }}" \
            "${assets[@]}" \
            --title "Release ${{ steps.release_tag.outputs.tag }}" \
            --generate-notes
