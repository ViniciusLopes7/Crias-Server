name: Build Archiso and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
    paths:
      - '**/*.sh'
      - '.github/workflows/**'
      - 'archiso-profile/**'
  pull_request:
    branches:
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/**'
      - 'archiso-profile/**'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run Shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './'

  build:
    needs: lint
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
      options: --privileged
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm archiso git github-cli grub

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p out
          mkarchiso -v -w /tmp/archiso-tmp -o out/ archiso-profile/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-server-iso
          path: out/*.iso
          retention-days: 7

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISO_FILE=$(ls out/*.iso)
          gh release create "${{ github.ref_name }}" "$ISO_FILE" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
