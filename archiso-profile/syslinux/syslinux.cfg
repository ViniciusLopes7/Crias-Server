# syslinux.cfg for Crias-Server ISO (BIOS boot)
#
# NOTA: NÃO usar `SERIAL 0 115200` aqui. Quando SERIAL está ativo, o syslinux
# envia output para AMBOS serial e VGA, causando caracteres duplicados no log
# do QEMU (-nographic captura serial, mas o eco do VGA também aparece).
# Em vez disso, o kernel usa `console=ttyS0,115200` (em APPEND abaixo) para
# output via serial. Assim:
#   - syslinux: output só em VGA (não capturado pelo QEMU -nographic, mas
#     visível em hardware real com monitor)
#   - kernel: output em serial (capturado pelo QEMU) E VGA (para hardware real)
# Sem duplicação.

UI menu.c32
MENU TITLE Crias Server OS
MENU BACKGROUND boot-bg.png

DEFAULT arch
PROMPT 0
# TIMEOUT em décimos de segundo. 10 = 1 segundo (boot rápido para CI).
# Em hardware real com monitor, usuário tem 1s para escolher opção no menu.
TIMEOUT 10

LABEL arch
    MENU LABEL Crias Server OS (Arch Linux)
    LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% edd=off console=ttyS0,115200 console=tty0 earlyprintk=serial,ttyS0,115200 loglevel=8

LABEL arch_copytoram
    MENU LABEL Crias Server OS (Copy to RAM)
    LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% copytoram=y edd=off console=ttyS0,115200 console=tty0 earlyprintk=serial,ttyS0,115200 loglevel=8
