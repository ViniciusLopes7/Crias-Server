# serial console at 115200 baud (unit 0 = COM1)
# Necessário para QEMU -nographic e para servidores com serial console real
# (IPMI/iLO). Sem isso, o vesamenu.c32 tenta renderizar menu gráfico e trava
# em ambientes headless.
SERIAL 0 115200

# menu.c32 (modo texto 80x25) em vez de vesamenu.c32 (modo gráfico VESA).
# menu.c32 funciona em serial console E VGA; vesamenu.c32 só funciona com
# display VGA real (trava em QEMU -nographic).
UI menu.c32
MENU TITLE Crias Server OS
MENU BACKGROUND boot-bg.png

DEFAULT arch
PROMPT 0
# TIMEOUT em décimos de segundo. 10 = 1 segundo (boot rápido para CI).
# Em hardware real com monitor, usuário tem 1s para escolher opção no menu.
TIMEOUT 10

LABEL arch
    MENU LABEL Crias Server OS (Arch Linux)
    LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% edd=off console=ttyS0,115200 console=tty0

LABEL arch_copytoram
    MENU LABEL Crias Server OS (Copy to RAM)
    LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
    INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
    APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% copytoram=y edd=off console=ttyS0,115200 console=tty0
