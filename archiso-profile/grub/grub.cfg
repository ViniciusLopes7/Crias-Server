# GRUB configuration for Server-Mine ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660

set default="0"
set timeout=5

menuentry "Minecraft Server OS (Arch Linux)" --class arch --class linux {
    set gfxpayload=keep
    linux /boot/vmlinuz-linux archisobasedir=arch archisosearchuuid=%ARCHISO_UUID%
    initrd /boot/initramfs-linux.img
}

menuentry "Minecraft Server OS (Copy to RAM)" --class arch --class linux {
    set gfxpayload=keep
    linux /boot/vmlinuz-linux archisobasedir=arch archisosearchuuid=%ARCHISO_UUID% copytoram
    initrd /boot/initramfs-linux.img
}
