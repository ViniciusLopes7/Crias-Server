# GRUB configuration for Crias-Server ISO

insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf
insmod png
insmod serial

set default="0"
# TIMEOUT em segundos. 1 = 1 segundo (boot rápido para CI).
# Em hardware real com monitor, usuário tem 1s para escolher opção no menu.
set timeout=1

# Tenta inicializar serial console (COM1 a 115200 baud).
# Se conseguir (QEMU -nographic ou servidor com serial real), usa serial
# para input E output. Caso contrário, cai para gfxterm (VGA).
# Isto resolve o problema do GRUB travar em QEMU headless.
if serial --unit=0 --speed=115200; then
    terminal_input serial console
    terminal_output serial
else
    if [ -f /boot/grub/fonts/unicode.pf2 ]; then
        loadfont /boot/grub/fonts/unicode.pf2
        terminal_output gfxterm
    elif [ -f /grub/fonts/unicode.pf2 ]; then
        loadfont /grub/fonts/unicode.pf2
        terminal_output gfxterm
    fi
fi

if [ -f /boot/grub/boot-bg.png ]; then
    background_image /boot/grub/boot-bg.png
elif [ -f /grub/boot-bg.png ]; then
    background_image /grub/boot-bg.png
fi

set color_normal=white/black
set color_highlight=cyan/black

menuentry "Crias Server OS (Arch Linux)" --class arch --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% edd=off console=ttyS0,115200 console=tty0 earlyprintk=serial,ttyS0,115200 loglevel=8
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Crias Server OS (Copy to RAM)" --class arch --class linux {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisosearchuuid=%ARCHISO_UUID% copytoram=y edd=off console=ttyS0,115200 console=tty0 earlyprintk=serial,ttyS0,115200 loglevel=8
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}
